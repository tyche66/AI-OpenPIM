[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
markers = [
    "smoke: smoke e2e tests",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's dependency and parameter declarations intentionally use calls as defaults.
"app/api/v1/*.py" = ["B008"]
"app/core/permission.py" = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
