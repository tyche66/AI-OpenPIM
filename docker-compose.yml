services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        BUILD_ID: ${BUILD_ID:-dev-local}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_ENV: ${APP_ENV:-production}
    environment:
      - DATABASE_URL=postgresql://pim:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ai_pim
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-10}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - APP_VERSION=${APP_VERSION:-dev}
      - BUILD_ID=${BUILD_ID:-dev-local}
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - APP_ENV=${APP_ENV:-production}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - AI_ADAPTER=${AI_ADAPTER:-none}
      - AI_API_URL=${AI_API_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_CHAT_MODEL=${AI_CHAT_MODEL:-gpt-4o-mini}
      - AI_EMBEDDING_MODEL=${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      - AI_EMBEDDING_DIM=${AI_EMBEDDING_DIM:-1536}
      - AI_TIMEOUT=${AI_TIMEOUT:-30}
      - AI_RATE_LIMIT=${AI_RATE_LIMIT:-10}
      - AI_RATE_LIMIT_WINDOW=${AI_RATE_LIMIT_WINDOW:-60}
      - OCR_ADAPTER=${OCR_ADAPTER:-none}
      - OCR_API_URL=${OCR_API_URL:-http://ocr:8080}
      - OCR_TIMEOUT=${OCR_TIMEOUT:-300}
      - BACKUP_DIR=${BACKUP_DIR:-/data/backups}
    volumes:
      # Read-only mount of the host backups directory so /health/ready and
      # /ops/status can report free bytes + capacity alert. The container
      # NEVER writes backup state here — backup scripts run on the host.
      - ./backups:/data/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ocr:
        condition: service_healthy
    restart: always
    healthcheck:
      # 自包含（Python），不依赖容器内 curl；判定 /api/v1/health 返回 200。
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=pim
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=ai_pim
    volumes:
      # PG16 使用独立命名卷，绝不挂载本机现有的 PG18 数据目录。
      - postgres_pg16_data:/var/lib/postgresql/data
      # 首次初始化（数据目录为空）时自动建集成测试库 ai_pim_test（幂等）。
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pim"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # MinIO 官方推荐探针；MinIO 镜像自带 curl。
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  gotenberg:
    image: gotenberg/gotenberg:8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  ocr:
    build: ./docker/ocr
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres_pg16_data:
    name: richangpim_go_postgres_pg16_data_20260716
  redis_data:
    name: richangpim_go_redis_data_20260716
  minio_data:
    name: richangpim_go_minio_data_20260716
